kind = "web"
previewPath = "/"
title = "BUSINESSNow — Delivery Command Center"
version = "1.0.0"
id = "artifacts/businessnow"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23582

[services.development]
run = "pnpm --filter @workspace/businessnow run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/businessnow", "run", "build" ]
publicDir = "artifacts/businessnow/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23582"
BASE_PATH = "/"
