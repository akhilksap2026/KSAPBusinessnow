components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    User:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [admin, executive, delivery_director, project_manager, resource_manager, finance_lead, sales, solution_architect, technical_consultant, qa_analyst, ams_lead, client_stakeholder, partner]
        title:
          type: string
        avatarUrl:
          type: string
        active:
          type: boolean
        createdAt:
          type: string
      required:
        - id
        - name
        - email
        - role
        - active
        - createdAt

    CreateUserBody:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
        role:
          type: string
        title:
          type: string
        avatarUrl:
          type: string
        active:
          type: boolean
      required:
        - name
        - email
        - role

    UpdateUserBody:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
        role:
          type: string
        title:
          type: string
        avatarUrl:
          type: string
        active:
          type: boolean

    Account:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        industry:
          type: string
        segment:
          type: string
          enum: [enterprise, mid_market, smb]
        status:
          type: string
          enum: [active, inactive, prospect, at_risk, churned]
        healthScore:
          type: integer
        annualContractValue:
          type: number
        accountOwnerId:
          type: integer
        region:
          type: string
        otmVersion:
          type: string
        cloudDeployment:
          type: boolean
        createdAt:
          type: string
        renewalDate:
          type: string
      required:
        - id
        - name
        - status
        - createdAt

    CreateAccountBody:
      type: object
      properties:
        name:
          type: string
        industry:
          type: string
        segment:
          type: string
        status:
          type: string
        healthScore:
          type: integer
        annualContractValue:
          type: number
        accountOwnerId:
          type: integer
        region:
          type: string
        otmVersion:
          type: string
        cloudDeployment:
          type: boolean
        renewalDate:
          type: string
      required:
        - name
        - status

    UpdateAccountBody:
      type: object
      properties:
        name:
          type: string
        industry:
          type: string
        segment:
          type: string
        status:
          type: string
        healthScore:
          type: integer
        annualContractValue:
          type: number
        accountOwnerId:
          type: integer
        region:
          type: string
        otmVersion:
          type: string
        cloudDeployment:
          type: boolean
        renewalDate:
          type: string

    Project:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        accountId:
          type: integer
        accountName:
          type: string
        type:
          type: string
          enum: [implementation, cloud_migration, ams, certification, rate_maintenance, data_acceleration]
        status:
          type: string
          enum: [active, on_hold, completed, cancelled, at_risk, planning]
        healthScore:
          type: integer
        pmId:
          type: integer
        pmName:
          type: string
        startDate:
          type: string
        endDate:
          type: string
        goLiveDate:
          type: string
        budgetHours:
          type: number
        consumedHours:
          type: number
        budgetValue:
          type: number
        billedValue:
          type: number
        completionPct:
          type: integer
        visibility:
          type: string
          enum: [internal_only, shared_with_client, partner_limited]
        description:
          type: string
        createdAt:
          type: string
      required:
        - id
        - name
        - accountId
        - type
        - status
        - createdAt

    CreateProjectBody:
      type: object
      properties:
        name:
          type: string
        accountId:
          type: integer
        type:
          type: string
        status:
          type: string
        pmId:
          type: integer
        startDate:
          type: string
        endDate:
