openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: OTMNow Delivery Command Center API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: users
    description: User management
  - name: accounts
    description: Account management
  - name: projects
    description: Project management
  - name: resources
    description: Resource management
  - name: allocations
    description: Resource allocations
  - name: timesheets
    description: Timesheet management
  - name: milestones
    description: Milestone tracking
  - name: tasks
    description: Task management
  - name: invoices
    description: Invoice management
  - name: opportunities
    description: Opportunities and pipeline
  - name: dashboard
    description: Dashboard aggregates and summaries
  - name: changeRequests
    description: Change request management
  - name: notifications
    description: Notification management

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /users:
    get:
      operationId: listUsers
      tags: [users]
      summary: List all users
      parameters:
        - name: role
          in: query
          schema:
            type: string
        - name: active
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
    post:
      operationId: createUser
      tags: [users]
      summary: Create a user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserBody"
      responses:
        "201":
          description: Created user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /users/{id}:
    get:
      operationId: getUser
